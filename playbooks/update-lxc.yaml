---
- name: General Debian/Ubuntu Update with Automatic GPG Key Management
  hosts: all
  become: true
  gather_facts: true
  serial: 10

  tasks:
    - name: Verify supported OS
      ansible.builtin.fail:
        msg: "Unsupported OS: {{ ansible_distribution }}. Only Debian/Ubuntu supported."
      when: ansible_os_family != "Debian"

    - name: Update apt cache
      block:
        - name: Run apt update
          ansible.builtin.apt:
            update_cache: true
          register: apt_update

      rescue:
        - name: Show apt update error
          ansible.builtin.debug:
            msg: "apt update failed: {{ apt_update.msg | default('unknown error') }}"

        - name: Import missing or expired GPG keys
          ansible.builtin.shell: |
            ERROR="{{ (apt_update.msg | default('')) + ' ' + (apt_update.stderr | default('')) }}"
            KEYS=$(echo "$ERROR" | grep -oP "(NO_PUBKEY|EXPKEYSIG) \K[A-F0-9]+" | sort -u)
            for key in $KEYS; do
              gpg --keyserver keyserver.ubuntu.com --recv-keys "$key"
              gpg --export "$key" | tee /etc/apt/trusted.gpg.d/${key}.gpg > /dev/null
            done
          when: >
            'NO_PUBKEY' in (apt_update.msg | default('')) or
            'EXPKEYSIG' in (apt_update.msg | default('')) or
            'NO_PUBKEY' in (apt_update.stderr | default('')) or
            'EXPKEYSIG' in (apt_update.stderr | default(''))
          changed_when: true

        - name: Accept repository release info changes
          ansible.builtin.shell: |
            apt-get -o DPkg::Options::=--force-confnew \
                    -o DPkg::Options::=--force-confdef \
                    --allow-releaseinfo-change update -y
          when: >
            'Release' in (apt_update.msg | default('')) or
            'Release' in (apt_update.stderr | default(''))
          changed_when: true

        - name: Retry apt update after fixes
          ansible.builtin.apt:
            update_cache: true

    - name: Upgrade system packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Install 'at' for scheduled reboots
      ansible.builtin.apt:
        name: at
        state: present
      when:
        - reboot_required.stat.exists
        - ansible_virtualization_type != 'lxc'

    - name: Schedule reboot at 04:00 (VMs only)
      ansible.builtin.shell: echo "/sbin/shutdown -r now" | at 04:00
      when:
        - reboot_required.stat.exists
        - ansible_virtualization_type != 'lxc'
      changed_when: true

    - name: Info - Reboot scheduled for 04:00
      ansible.builtin.debug:
        msg: "Reboot scheduled for 04:00 on {{ inventory_hostname }} ({{ ansible_virtualization_type }})"
      when:
        - reboot_required.stat.exists
        - ansible_virtualization_type != 'lxc'

    - name: Info - LXC reboot skipped
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} requires reboot after kernel update but is an LXC container - skipping"
      when:
        - reboot_required.stat.exists
        - ansible_virtualization_type == 'lxc'
