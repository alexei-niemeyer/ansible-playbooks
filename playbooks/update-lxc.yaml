---
- name: General Debian/Ubuntu Update with Automatic GPG Key Management
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Detect operating system
      ansible.builtin.shell: |
        if grep -qi ubuntu /etc/os-release; then
          echo "Ubuntu detected."
        elif grep -qi debian /etc/os-release; then
          echo "Debian detected."
        else
          echo "Unsupported OS"
          exit 1
        fi
      register: os_check
      changed_when: false
      failed_when: os_check.rc != 0

    - name: Run apt update and handle GPG/repo errors
      block:
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: yes
          register: apt_update
          ignore_errors: yes

        - name: Debug apt update result
          ansible.builtin.debug:
            msg:
              - "Failed: {{ apt_update.failed | default('N/A') }}"
              - "Error: {{ apt_update.msg | default('None') }}"

        - name: Import missing or expired GPG keys if needed
          ansible.builtin.shell: |
            STDERR="{{ apt_update.stderr | default('') }}"
            if [ -n "$STDERR" ]; then
              MISSING_KEYS=$(echo "$STDERR" | grep -o "NO_PUBKEY [A-F0-9]*" | awk '{print $2}' || true)
              EXPIRED_KEYS=$(echo "$STDERR" | grep -o "EXPKEYSIG [A-F0-9]*" | awk '{print $2}' || true)
              ALL_KEYS=$(echo "$MISSING_KEYS $EXPIRED_KEYS" | tr ' ' '\n' | sort -u)

              if [ -n "$ALL_KEYS" ]; then
                for key in $ALL_KEYS; do
                  apt-key adv --keyserver keyserver.ubuntu.com --recv-keys "$key" || true
                done
                exit 1
              fi
            fi
            exit 0
          register: key_import
          changed_when: key_import.rc != 0
          when: apt_update is failed

        - name: Accept repository changes automatically
          ansible.builtin.shell: |
            apt-get -o DPkg::Options::=--force-confnew \
                    -o DPkg::Options::=--force-confdef \
                    --allow-releaseinfo-change update -y
          register: repo_fix
          changed_when: "'Get:' in repo_fix.stdout"
          when: apt_update is failed

        - name: Update apt cache again if keys or repo accepted
          ansible.builtin.apt:
            update_cache: yes
          when: key_import is changed or repo_fix is changed

    - name: Upgrade system packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes